appId: com.noema.app
productName: Noema
directories:
  output: release
files:
  - out/**
  - package.json
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  identity: null
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
